name: Bug Report
description: Report a bug to help improve AuraSpend
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: input
    id: device
    attributes:
      label: Device & OS
      description: What device and Android version are you using?
      placeholder: e.g. Pixel 8, Android 16
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: 1. Go to... 2. Tap on... 3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste logcat output or attach screenshots if available.
